defaults: ../default.yaml

experiment:
  name: ablation_backbone_only
  description: "Ablation: EdgeCAAI-Net backbone only (no exits, no budget, no artist invariance)"

exits:
  enabled: false
  positions: [2, 4, 6]
  weights: [0.2, 0.3, 0.5]

budget:
  enabled: false

artist_invariance:
  method: none

dataset:
  name: fma_small
  audio_dir: Datasets/fma/fma_small
  metadata_dir: Datasets/fma/fma_metadata
  num_genres: 8
  split_type: artist_disjoint
  split_dir: data/splits
  split_files:
    train: artist_disjoint_train.json
    val: artist_disjoint_val.json
    test: artist_disjoint_test.json
  processed_dir: data/processed/fma_artist

results:
  output_dir: results/ablations/backbone_only
  checkpoint_dir: results/ablations/backbone_only/checkpoints
