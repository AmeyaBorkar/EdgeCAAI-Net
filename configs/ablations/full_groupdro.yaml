defaults: ../default.yaml

experiment:
  name: ablation_full_groupdro
  description: "Ablation: Full EdgeCAAI-Net with GroupDRO instead of GRL"

exits:
  enabled: true
  positions: [2, 4, 6]
  weights: [0.2, 0.3, 0.5]

budget:
  enabled: true
  lambda_budget: 0.02

artist_invariance:
  method: groupdro

dataset:
  name: fma_small
  audio_dir: Datasets/fma/fma_small
  metadata_dir: Datasets/fma/fma_metadata
  num_genres: 8
  split_type: artist_disjoint
  split_dir: data/splits
  split_files:
    train: artist_disjoint_train.json
    val: artist_disjoint_val.json
    test: artist_disjoint_test.json
  processed_dir: data/processed/fma_artist

results:
  output_dir: results/ablations/full_groupdro
  checkpoint_dir: results/ablations/full_groupdro/checkpoints
