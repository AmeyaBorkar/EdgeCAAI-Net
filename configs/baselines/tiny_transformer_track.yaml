defaults: ../default.yaml

experiment:
  name: tiny_transformer_fma_track
  description: "Baseline D: TinyTransformer on FMA track-disjoint"

model:
  name: tiny_transformer
  d_model: 128
  n_heads: 4
  n_blocks: 4
  ffn_dim: 256
  dropout: 0.15

dataset:
  name: fma_small
  audio_dir: Datasets/fma/fma_small
  metadata_dir: Datasets/fma/fma_metadata
  num_genres: 8
  split_type: track_disjoint
  split_dir: data/splits
  split_files:
    train: track_disjoint_train.json
    val: track_disjoint_val.json
    test: track_disjoint_test.json
  processed_dir: data/processed/fma_track

results:
  output_dir: results/baselines/tiny_transformer_track
  checkpoint_dir: results/baselines/tiny_transformer_track/checkpoints
