defaults: ../default.yaml

experiment:
  name: mobilenet_fma_artist
  description: "Baseline C: MobileNetV3-Small on FMA artist-disjoint"

model:
  name: mobilenet
  pretrained: false

dataset:
  name: fma_small
  audio_dir: Datasets/fma/fma_small
  metadata_dir: Datasets/fma/fma_metadata
  num_genres: 8
  split_type: artist_disjoint
  split_dir: data/splits
  split_files:
    train: artist_disjoint_train.json
    val: artist_disjoint_val.json
    test: artist_disjoint_test.json
  processed_dir: data/processed/fma_artist

results:
  output_dir: results/baselines/mobilenet_artist
  checkpoint_dir: results/baselines/mobilenet_artist/checkpoints
