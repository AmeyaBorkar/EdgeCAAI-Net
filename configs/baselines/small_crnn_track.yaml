defaults: ../default.yaml

experiment:
  name: small_crnn_fma_track
  description: "Baseline B: SmallCRNN on FMA track-disjoint"

model:
  name: small_crnn
  gru_hidden: 128

dataset:
  name: fma_small
  audio_dir: Datasets/fma/fma_small
  metadata_dir: Datasets/fma/fma_metadata
  num_genres: 8
  split_type: track_disjoint
  split_dir: data/splits
  split_files:
    train: track_disjoint_train.json
    val: track_disjoint_val.json
    test: track_disjoint_test.json
  processed_dir: data/processed/fma_track

results:
  output_dir: results/baselines/small_crnn_track
  checkpoint_dir: results/baselines/small_crnn_track/checkpoints
