defaults: ../default.yaml

experiment:
  name: small_crnn_fma_artist
  description: "Baseline B: SmallCRNN on FMA artist-disjoint"

model:
  name: small_crnn
  gru_hidden: 128

dataset:
  name: fma_small
  audio_dir: Datasets/fma/fma_small
  metadata_dir: Datasets/fma/fma_metadata
  num_genres: 8
  split_type: artist_disjoint
  split_dir: data/splits
  split_files:
    train: artist_disjoint_train.json
    val: artist_disjoint_val.json
    test: artist_disjoint_test.json
  processed_dir: data/processed/fma_artist

results:
  output_dir: results/baselines/small_crnn_artist
  checkpoint_dir: results/baselines/small_crnn_artist/checkpoints
