# FMA Track-Disjoint Experiment Configuration
# Inherits from default.yaml, overrides dataset-specific settings

defaults: default.yaml

experiment:
  name: fma_track_disjoint
  description: "FMA Small - track-disjoint split evaluation"

dataset:
  name: fma_small
  audio_dir: Datasets/fma/fma_small
  metadata_dir: Datasets/fma/fma_metadata
  num_genres: 8
  split_type: track_disjoint
  split_dir: data/splits
  split_files:
    train: track_disjoint_train.json
    val: track_disjoint_val.json
    test: track_disjoint_test.json
  processed_dir: data/processed/fma_track

# Artist invariance disabled for track-disjoint baseline
artist_invariance:
  method: none

results:
  output_dir: results/fma_track_disjoint
  checkpoint_dir: results/fma_track_disjoint/checkpoints
